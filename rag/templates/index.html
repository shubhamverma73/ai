<!DOCTYPE html>
<html>
<head>

    <title>PDF Chatbot</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

</head>

<body>

    <div class="container">

        <h1>PDF Chatbot</h1>

        <div id="chat-box"></div>

        <div class="input-area">

            <input
                type="text"
                id="question"
                placeholder="Ask something..."
            >

            <button onclick="sendQuestion()">
                Send
            </button>

        </div>

    </div>

    <script
        src="{{ url_for('static', filename='js/app.js') }}"
    ></script>

</body>
</html>
